name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        node: [24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Build Rust FFI
        shell: bash
        run: |
          cd rust
          pnpm exec napi build --release
          cp corelib-rust.node ../ts-core/corelib-rust.node

      - name: Build Core
        run: pnpm --filter @ckir/corelib build

      - name: Test Core
        run: pnpm --filter @ckir/corelib test

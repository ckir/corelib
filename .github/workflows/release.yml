# =============================================
# FILE: .github/workflows/release.yml
# PURPOSE: Builds TS packages, cross-compiles Rust FFI binaries, 
#          and creates a GitHub Release with minimal packages.
# =============================================

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ts:
    name: Build TS Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build All
        run: pnpm build-all

      - name: Pack Packages
        run: |
          mkdir dist-packages
          pnpm --filter @ckir/corelib pack --pack-destination ./dist-packages
          pnpm --filter @ckir/corelib-cloud pack --pack-destination ./dist-packages
          pnpm --filter @ckir/corelib-markets pack --pack-destination ./dist-packages

      - name: Upload TS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ts-packages
          path: dist-packages/*.tgz
          retention-days: 1

  build-rust:
    name: Build Rust Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: corelib-rust-linux-x64.node
          - os: macos-latest
            artifact_name: corelib-rust-darwin-x64.node
          - os: macos-14
            artifact_name: corelib-rust-darwin-arm64.node
          - os: windows-latest
            artifact_name: corelib-rust-win32-x64.node
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Build Rust FFI
        run: |
          cd rust
          pnpm exec napi build --release
          
      - name: Rename Artifact for OS/Arch
        shell: bash
        run: |
          mv rust/corelib-rust.node ${{ matrix.artifact_name }}

      - name: Upload Rust Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-ts, build-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download TS Packages
        uses: actions/download-artifact@v8
        with:
          name: ts-packages
          path: artifacts

      - name: Download Rust Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

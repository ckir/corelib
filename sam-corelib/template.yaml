AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Corelib - Resilient Nasdaq Market Data Proxy

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: nodejs24.x
    Architectures: [x86_64]

Resources:
  CorelibFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: corelib
      CodeUri: ../ts-cloud/dist/aws
      Handler: handler.handler
      Environment:
        Variables:
          MODE: production
          LOG_LEVEL: info
          CORELIB_TURSO_URL: "libsql://:memory:"
          CORELIB_TURSO_TOKEN: "local-dev-token"
      Events:
        HttpApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        HttpApiRootEvent:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - '*'
          AllowMethods:
            - '*'               # - This fixes the lint error (covers POST + OPTIONS)
          AllowHeaders:
            - '*'

Outputs:
  CorelibFunctionUrl:
    Description: "Public HTTPS endpoint"
    Value: !GetAtt CorelibFunctionUrl.FunctionUrl
